<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FFD700">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Sunny Cafe Finder</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #0f0f1a; color: #e0e0e0; overflow: hidden; height: 100dvh; }

  #map { width: 100%; height: 100dvh; z-index: 1; }

  /* Search bar */
  .search-bar {
    position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
    z-index: 1000; display: flex; gap: 8px; width: min(420px, calc(100% - 32px));
  }
  .search-bar input {
    flex: 1; padding: 12px 16px; border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px; background: rgba(15,15,26,0.92); color: #e0e0e0;
    font-size: 15px; backdrop-filter: blur(16px); outline: none;
    transition: border-color 0.2s;
  }
  .search-bar input:focus { border-color: rgba(255,215,0,0.5); }
  .search-bar input::placeholder { color: #666; }
  .search-bar button {
    padding: 12px 16px; border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px; background: rgba(15,15,26,0.92); color: #FFD700;
    font-size: 15px; cursor: pointer; backdrop-filter: blur(16px);
    transition: background 0.2s;
  }
  .search-bar button:hover { background: rgba(255,215,0,0.15); }

  /* Time slider panel */
  .time-panel {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 1000;
    background: rgba(15,15,26,0.92); backdrop-filter: blur(16px);
    border-top: 1px solid rgba(255,255,255,0.08);
    padding: 16px 20px 24px; display: flex; flex-direction: column; gap: 8px;
  }
  .time-header {
    display: flex; justify-content: space-between; align-items: center;
  }
  .time-label { font-size: 13px; color: #888; }
  .time-value { font-size: 22px; font-weight: 600; color: #FFD700; font-variant-numeric: tabular-nums; }
  .time-date { font-size: 13px; color: #666; margin-left: 8px; }
  .sun-times { font-size: 12px; color: #555; display: flex; justify-content: space-between; }

  .cloud-badge {
    display: inline-block; margin-left: 10px; padding: 2px 8px;
    border-radius: 6px; font-size: 12px; font-weight: 500;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
    vertical-align: middle; transition: opacity 0.3s, color 0.3s;
  }
  .cloud-badge.unavailable { opacity: 0.3; color: #555; }
  .cloud-badge.low { color: #4CAF50; }
  .cloud-badge.medium { color: #FF9800; }
  .cloud-badge.high { color: #F44336; }

  input[type="range"] {
    -webkit-appearance: none; width: 100%; height: 6px;
    border-radius: 3px; background: linear-gradient(to right, #1a1a3e, #FFD700 50%, #1a1a3e);
    outline: none; cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 24px; height: 24px;
    border-radius: 50%; background: #FFD700; border: 2px solid #0f0f1a;
    box-shadow: 0 0 10px rgba(255,215,0,0.4); cursor: grab;
  }
  @media (max-width: 767px) {
    input[type="range"]::-webkit-slider-thumb { width: 44px; height: 44px; }
  }

  .now-btn {
    padding: 4px 10px; border: 1px solid rgba(255,215,0,0.3);
    border-radius: 6px; background: transparent; color: #FFD700;
    font-size: 11px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .now-btn:hover { background: rgba(255,215,0,0.1); }

  /* Legend */
  .legend {
    position: absolute; bottom: 120px; left: 16px; z-index: 1000;
    background: rgba(15,15,26,0.92); backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 10px;
    padding: 10px 14px; font-size: 12px; line-height: 1.8;
  }
  .legend-item { display: flex; align-items: center; gap: 8px; }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  }

  /* Sun compass */
  .sun-compass {
    position: absolute; top: 80px; right: 16px; z-index: 1000;
    width: 56px; height: 56px; border-radius: 50%;
    background: rgba(15,15,26,0.92); backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: center;
  }
  .sun-arrow {
    width: 40px; height: 40px; transition: transform 0.3s ease;
  }

  /* Stats badge */
  .stats-badge {
    position: absolute; top: 80px; left: 16px; z-index: 1000;
    background: rgba(15,15,26,0.92); backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 10px;
    padding: 8px 12px; font-size: 12px; color: #888;
  }
  .stats-badge strong { color: #e0e0e0; }

  /* Loading overlay */
  .loading {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    z-index: 2000; background: rgba(15,15,26,0.95); border-radius: 12px;
    padding: 20px 28px; font-size: 14px; color: #FFD700;
    display: none; align-items: center; gap: 10px;
    border: 1px solid rgba(255,215,0,0.2);
  }
  .loading.active { display: flex; }

  /* Toast notification */
  .toast {
    position: absolute; top: 72px; left: 50%; transform: translateX(-50%);
    z-index: 3000; padding: 10px 16px; border-radius: 10px;
    font-size: 13px; max-width: min(400px, calc(100% - 32px));
    backdrop-filter: blur(16px); opacity: 0; transition: opacity 0.3s;
    pointer-events: none;
  }
  .toast.active { opacity: 1; pointer-events: auto; }
  .toast.warn {
    background: rgba(255,152,0,0.15); border: 1px solid rgba(255,152,0,0.3); color: #FF9800;
  }
  .toast.error {
    background: rgba(244,67,54,0.15); border: 1px solid rgba(244,67,54,0.3); color: #F44336;
  }
  .loading .spinner {
    width: 18px; height: 18px; border: 2px solid rgba(255,215,0,0.2);
    border-top-color: #FFD700; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Leaflet popup styling */
  .leaflet-popup-content-wrapper {
    background: rgba(15,15,26,0.95) !important; color: #e0e0e0 !important;
    border-radius: 10px !important; border: 1px solid rgba(255,255,255,0.1) !important;
    backdrop-filter: blur(16px);
  }
  .leaflet-popup-tip { background: rgba(15,15,26,0.95) !important; }
  .leaflet-popup-content { margin: 12px 16px !important; font-size: 13px !important; line-height: 1.6 !important; }
  .popup-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .popup-status { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; margin: 4px 0; }
  .popup-status.sunny { background: rgba(76,175,80,0.2); color: #4CAF50; }
  .popup-status.partial { background: rgba(255,152,0,0.2); color: #FF9800; }
  .popup-status.shade { background: rgba(120,144,156,0.2); color: #78909C; }
  .popup-status.night { background: rgba(100,100,120,0.2); color: #666; }
  .popup-detail { color: #888; font-size: 12px; }
  .popup-ai-desc { margin: 6px 0; padding: 6px 8px; background: rgba(255,215,0,0.06); border-left: 2px solid rgba(255,215,0,0.3); border-radius: 0 4px 4px 0; font-size: 12px; color: #bbb; font-style: italic; }
  .popup-sun-hours { margin-top: 6px; padding-top: 6px; border-top: 1px solid rgba(255,255,255,0.06); font-size: 12px; color: #999; }

  /* Bottom sheet (mobile) */
  .bottom-sheet {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 2000;
    background: rgba(15,15,26,0.96); backdrop-filter: blur(20px);
    border-top: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px 16px 0 0; padding: 8px 20px 24px;
    transform: translateY(100%); transition: transform 0.3s ease;
    max-height: 45vh; display: none;
  }
  .bottom-sheet.open { transform: translateY(0); }
  .sheet-handle {
    width: 36px; height: 4px; border-radius: 2px;
    background: rgba(255,255,255,0.2); margin: 0 auto 12px;
  }
  .sheet-close {
    position: absolute; top: 8px; right: 12px;
    width: 28px; height: 28px; border-radius: 50%; border: none;
    background: rgba(255,255,255,0.08); color: #999; font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .sheet-close:hover { color: #e0e0e0; background: rgba(255,255,255,0.15); }
  .sheet-content { font-size: 14px; line-height: 1.7; }
  .sheet-name { font-size: 17px; font-weight: 600; margin-bottom: 2px; }
  .sheet-score { display: inline-block; padding: 2px 10px; border-radius: 5px; font-size: 12px; font-weight: 500; margin-bottom: 8px; }
  .sheet-row { display: flex; justify-content: space-between; color: #999; font-size: 13px; padding: 2px 0; }
  .sheet-ai-desc { margin: 8px 0; padding: 6px 8px; background: rgba(255,215,0,0.06); border-left: 2px solid rgba(255,215,0,0.3); border-radius: 0 4px 4px 0; font-size: 12px; color: #bbb; font-style: italic; }

  @media (min-width: 768px) { .bottom-sheet { display: none !important; } }

  /* List toggle button */
  .list-toggle {
    position: absolute; top: 144px; right: 16px; z-index: 2000;
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(15,15,26,0.92); backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.08); color: #e0e0e0;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    transition: background 0.2s;
  }
  .list-toggle:hover { background: rgba(30,30,50,0.95); }

  /* Cafe list panel */
  .cafe-list-panel {
    display: none; position: fixed; z-index: 1500;
    background: rgba(15,15,26,0.96); backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.08); overflow: hidden;
    flex-direction: column;
  }
  .cafe-list-panel.open { display: flex; }

  /* Mobile: full overlay */
  @media (max-width: 767px) {
    .cafe-list-panel { inset: 0; border-radius: 0; padding-top: 70px; }
  }
  /* Desktop: 40% right panel */
  @media (min-width: 768px) {
    .cafe-list-panel {
      top: 0; right: 0; bottom: 0; width: 40%;
      border-left: 1px solid rgba(255,255,255,0.08); border-radius: 0;
    }
    #map.split { width: 60% !important; }
  }

  .list-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 20px 12px; border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }
  .list-sort { display: flex; align-items: center; gap: 6px; }
  .sort-option { font-size: 14px; color: #666; cursor: pointer; transition: color 0.2s; }
  .sort-option.active { color: #FFD700; font-weight: 600; text-decoration: underline; text-underline-offset: 3px; }
  .sort-option:hover { color: #e0e0e0; }
  .sort-sep { color: #444; font-size: 14px; }
  .list-count { font-size: 12px; color: #555; }
  .list-close {
    width: 32px; height: 32px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05); color: #999; font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: color 0.2s;
  }
  .list-close:hover { color: #e0e0e0; background: rgba(255,255,255,0.1); }

  .list-items { flex: 1; overflow-y: auto; padding: 4px 0; }
  .list-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 20px; cursor: pointer; transition: background 0.15s;
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }
  .list-item:hover { background: rgba(255,255,255,0.04); }
  .list-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .list-info { flex: 1; min-width: 0; }
  .list-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .list-meta { font-size: 12px; color: #777; display: flex; gap: 12px; margin-top: 2px; }
  .list-closed { opacity: 0.4; }

  .leaflet-control-zoom { border: 1px solid rgba(255,255,255,0.1) !important; }
  .leaflet-control-zoom a {
    background: rgba(15,15,26,0.9) !important; color: #e0e0e0 !important;
    border-color: rgba(255,255,255,0.08) !important;
  }
  .leaflet-control-zoom a:hover { background: rgba(30,30,50,0.95) !important; }
</style>
</head>
<body>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Stadt oder Adresse suchen..." />
  <button onclick="searchLocation()" id="searchBtn">&#x1F50D;</button>
</div>

<button class="list-toggle" id="listToggle" onclick="toggleListView()" title="Listenansicht">
  <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
    <line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/>
  </svg>
</button>

<div class="cafe-list-panel" id="cafeListPanel">
  <div class="list-header">
    <div class="list-sort">
      <span class="sort-option active" id="sortSunny" onclick="setListSort('sunny')">Sonnigste</span>
      <span class="sort-sep">·</span>
      <span class="sort-option" id="sortDistance" onclick="setListSort('distance')">Nächste</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <span class="list-count" id="listCount"></span>
      <button class="list-close" onclick="toggleListView()" title="Liste schließen">&times;</button>
    </div>
  </div>
  <div class="list-items" id="listItems"></div>
</div>

<div class="sun-compass" title="Sonnenrichtung">
  <svg class="sun-arrow" id="sunArrow" viewBox="0 0 40 40">
    <circle cx="20" cy="20" r="8" fill="#FFD700" opacity="0.3"/>
    <circle cx="20" cy="20" r="5" fill="#FFD700"/>
    <line x1="20" y1="20" x2="20" y2="4" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round"/>
  </svg>
</div>

<div class="stats-badge" id="stats">
  <strong id="cafeCount">0</strong> Cafes geladen
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#4CAF50"></div> Sonnig</div>
  <div class="legend-item"><div class="legend-dot" style="background:#FF9800"></div> Teilweise</div>
  <div class="legend-item"><div class="legend-dot" style="background:#78909C"></div> Schatten</div>
  <label class="legend-item" style="cursor:pointer;margin-top:4px;padding-top:4px;border-top:1px solid rgba(255,255,255,0.06)">
    <input type="checkbox" id="filterClosed" checked style="accent-color:#FFD700" onchange="updateSunnyScores()">
    <span>Geschlossene ausblenden</span>
  </label>
</div>

<div id="map"></div>

<div class="time-panel">
  <div class="time-header">
    <div>
      <span class="time-value" id="timeValue">--:--</span>
      <span class="time-date" id="dateValue" style="cursor:pointer" onclick="document.getElementById('datePicker').showPicker()"></span>
      <span class="cloud-badge" id="cloudBadge" title="Bewölkung"></span>
      <input type="date" id="datePicker" style="position:absolute;opacity:0;pointer-events:none;width:0;height:0">
    </div>
    <button class="now-btn" onclick="setNow()">Jetzt</button>
  </div>
  <input type="range" id="timeSlider" min="0" max="1440" step="5" />
  <div class="sun-times">
    <span id="sunriseLabel">Aufgang --:--</span>
    <span id="sunsetLabel">Untergang --:--</span>
  </div>
</div>

<div class="bottom-sheet" id="bottomSheet">
  <div class="sheet-handle"></div>
  <button class="sheet-close" onclick="closeSheet()" title="Schließen">&times;</button>
  <div class="sheet-content" id="sheetContent"></div>
</div>

<div class="toast" id="toast"></div>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <span>Lade Cafes...</span>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>
<script>
// ── State ──────────────────────────────────────
let map, cafeLayer;
let cafes = [];
let streets = [];
let selectedTime = new Date();
let selectedDate = null; // null = today, else 'YYYY-MM-DD'
let sunTimes = null;
let loadTimeout = null;
let isLoading = false;
let urlReady = false; // suppress updateUrl during init
let lastBbox = '';
let enrichedData = null; // Pre-enriched JSON, if available
let ohLibLoaded = false;
let weatherData = null; // { hourly: { time: [...], cloud_cover: [...] } }
let weatherCenter = null; // { lat, lng } for cache invalidation
const MIN_ZOOM = 13;
const DEBOUNCE_MS = 2000;

// ── Map Init ───────────────────────────────────
function initMap(lat, lng, zoom, hasUrlTime) {
  map = L.map('map', {
    center: [lat, lng],
    zoom: zoom || 14,
    zoomControl: true
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://carto.com/">CARTO</a> &copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>',
    maxZoom: 19
  }).addTo(map);

  cafeLayer = L.layerGroup().addTo(map);

  map.on('click', () => {
    if (document.getElementById('bottomSheet').classList.contains('open')) closeSheet();
  });

  map.on('moveend', () => {
    clearTimeout(loadTimeout);
    loadTimeout = setTimeout(loadData, DEBOUNCE_MS);
    updateUrl();
  });

  initTimeSlider(hasUrlTime);
  loadOpeningHoursLib();
  tryLoadEnriched().then(() => loadData());
}

// ── Pre-Enriched Data ─────────────────────────
function loadOpeningHoursLib() {
  const s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/opening_hours@3/build/opening_hours.min.js';
  s.onload = () => { ohLibLoaded = true; updateSunnyScores(); };
  document.head.appendChild(s);
}

async function tryLoadEnriched() {
  // Try loading pre-enriched JSON for known cities
  const cities = ['hamburg', 'berlin', 'muenchen', 'koeln', 'frankfurt'];
  for (const city of cities) {
    try {
      const res = await fetch(`data/${city}.json`);
      if (res.ok) {
        const data = await res.json();
        enrichedData = enrichedData || {};
        for (const cafe of data.cafes) {
          enrichedData[cafe.id] = cafe;
        }
        console.log(`Pre-enriched: ${data.cafes.length} Cafés aus ${data.city}`);
      }
    } catch {}
  }
}

// ── Cafe API ──────────────────────────────────
async function fetchCafes(bbox, retries = 2) {
  const rounded = bbox.split(',').map(n => parseFloat(n).toFixed(3)).join(',');
  const url = `/api/cafes?bbox=${rounded}`;
  for (let attempt = 0; attempt <= retries; attempt++) {
    const res = await fetch(url);
    if ((res.status === 429 || res.status === 504) && attempt < retries) {
      const wait = (attempt + 1) * 4000;
      showToast(`API überlastet — neuer Versuch in ${wait/1000}s...`, 'warn');
      await new Promise(r => setTimeout(r, wait));
      continue;
    }
    if (res.status === 429) throw new Error('rate-limit');
    if (!res.ok) throw new Error('API error: ' + res.status);
    return res.json();
  }
}

function getBbox() {
  const b = map.getBounds();
  return `${b.getSouth()},${b.getWest()},${b.getNorth()},${b.getEast()}`;
}

// ── Cache ──────────────────────────────────────
const CACHE_PREFIX = 'suncafe_';
const CACHE_TTL = 24 * 60 * 60 * 1000; // 24h

function getCacheKey(bbox) {
  // Round to ~100m grid so nearby viewports share cache
  const parts = bbox.split(',').map(n => parseFloat(n).toFixed(3));
  return CACHE_PREFIX + parts.join(',');
}

function getCache(key) {
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return null;
    const cached = JSON.parse(raw);
    if (Date.now() - cached.ts > CACHE_TTL) {
      localStorage.removeItem(key);
      return null;
    }
    return cached.data;
  } catch { return null; }
}

function setCache(key, data) {
  try {
    localStorage.setItem(key, JSON.stringify({ ts: Date.now(), data }));
  } catch {
    // localStorage full — evict oldest entries
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k.startsWith(CACHE_PREFIX)) keys.push(k);
    }
    keys.sort().slice(0, Math.ceil(keys.length / 2)).forEach(k => localStorage.removeItem(k));
    try { localStorage.setItem(key, JSON.stringify({ ts: Date.now(), data })); } catch {}
  }
}

// ── Weather ───────────────────────────────────
async function fetchWeather(lat, lng) {
  try {
    const rlat = lat.toFixed(2), rlng = lng.toFixed(2);
    const res = await fetch(`/api/weather?lat=${rlat}&lng=${rlng}`);
    if (!res.ok) return null;
    return res.json();
  } catch { return null; }
}

function getCloudCover(time) {
  if (!weatherData?.hourly) return null;
  const hours = weatherData.hourly.time;
  const clouds = weatherData.hourly.cloud_cover;
  const targetMs = time.getTime();
  // Find nearest hour
  let bestIdx = 0, bestDiff = Infinity;
  for (let i = 0; i < hours.length; i++) {
    const diff = Math.abs(new Date(hours[i]).getTime() - targetMs);
    if (diff < bestDiff) { bestDiff = diff; bestIdx = i; }
  }
  // Only return if within 1h of a data point
  return bestDiff < 3600000 ? clouds[bestIdx] : null;
}

function isDateInForecast() {
  if (!weatherData?.hourly?.time?.length) return false;
  const first = new Date(weatherData.hourly.time[0]);
  const last = new Date(weatherData.hourly.time[weatherData.hourly.time.length - 1]);
  return selectedTime >= first && selectedTime <= last;
}

function updateCloudBadge() {
  const badge = document.getElementById('cloudBadge');
  if (!isDateInForecast()) {
    badge.textContent = '☁ —';
    badge.className = 'cloud-badge unavailable';
    badge.title = 'Keine Wetterdaten für dieses Datum';
    return;
  }
  const cloud = getCloudCover(selectedTime);
  if (cloud === null) {
    badge.textContent = '☁ —';
    badge.className = 'cloud-badge unavailable';
    return;
  }
  badge.textContent = `☁ ${cloud}%`;
  const level = cloud > 85 ? 'high' : cloud > 60 ? 'medium' : 'low';
  badge.className = `cloud-badge ${level}`;
  badge.title = `Bewölkung: ${cloud}%`;
}

async function loadWeatherIfNeeded() {
  const center = map.getCenter();
  // Skip if we already have weather for this area
  if (weatherCenter &&
      Math.abs(center.lat - weatherCenter.lat) < 0.05 &&
      Math.abs(center.lng - weatherCenter.lng) < 0.05) return;
  weatherCenter = { lat: center.lat, lng: center.lng };
  weatherData = await fetchWeather(center.lat, center.lng);
  updateCloudBadge();
  updateSunnyScores();
}

async function loadData() {
  if (map.getZoom() < MIN_ZOOM) {
    cafeLayer.clearLayers();
    cafes = [];
    document.getElementById('cafeCount').textContent = '0';
    document.getElementById('stats').querySelector('strong').nextSibling.textContent =
      ' Cafes — bitte reinzoomen (Zoom ' + MIN_ZOOM + '+)';
    return;
  }

  const bbox = getBbox();

  // Skip if already loading or viewport barely changed
  if (isLoading) return;
  if (bbox === lastBbox) return;
  lastBbox = bbox;

  const cacheKey = getCacheKey(bbox);
  const cached = getCache(cacheKey);

  if (cached) {
    console.log('Cache hit:', cacheKey);
    loadWeatherIfNeeded();
    processData(cached);
    return;
  }

  isLoading = true;
  showLoading(true);

  try {
    const [data] = await Promise.all([fetchCafes(bbox), loadWeatherIfNeeded()]);
    setCache(cacheKey, data);
    processData(data);
  } catch (err) {
    console.error('Load error:', err);
    lastBbox = '';
    if (err.message === 'rate-limit') {
      showToast('Rate-Limit erreicht — bitte 30s warten, dann Karte verschieben.', 'error', 10000);
    } else {
      showToast('Fehler beim Laden. Kurz warten, dann verschieben.', 'warn');
    }
  }

  isLoading = false;
  showLoading(false);
}

function processData(data) {
  // Split elements into cafes and streets
  const cafeElements = [];
  const streetElements = [];
  for (const e of data.elements) {
    if (e.tags && e.tags.amenity === 'cafe') cafeElements.push(e);
    else if (e.tags && e.tags.highway && e.geometry) streetElements.push(e);
  }

  // Parse cafes + merge pre-enriched AI data
  cafes = cafeElements
    .map(e => {
      const ai = enrichedData?.[e.id];
      return {
        id: e.id,
        lat: e.lat || (e.center && e.center.lat),
        lng: e.lon || (e.center && e.center.lon),
        name: e.tags.name || 'Unbekanntes Cafe',
        outdoor: e.tags.outdoor_seating,
        cuisine: e.tags.cuisine || '',
        hours: e.tags.opening_hours || '',
        facing: null,
        score: null,
        marker: null,
        // AI enrichment
        aiDirection: ai?.ai_direction || null,
        aiDescription: ai?.ai_description || null,
        aiSunPeriod: ai?.ai_sun_period || null,
        aiConfidence: ai?.ai_confidence || null,
      };
    })
    .filter(c => c.lat && c.lng);

  // Remove duplicates (nodes and ways for same cafe)
  const seen = new Set();
  cafes = cafes.filter(c => {
    const key = c.lat.toFixed(5) + ',' + c.lng.toFixed(5);
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  // Parse streets as arrays of coordinate pairs
  streets = streetElements
    .filter(e => e.geometry.length > 1)
    .map(e => e.geometry.map(n => [n.lat, n.lon]));

  // Calculate facing directions — prefer AI enrichment over geometry heuristic
  const dirToBearing = { N:0, NE:45, E:90, SE:135, S:180, SW:225, W:270, NW:315 };
  for (const cafe of cafes) {
    if (cafe.aiDirection && cafe.aiDirection !== 'unknown') {
      cafe.facing = dirToBearing[cafe.aiDirection] ?? null;
      cafe.facingSource = 'ai';
    } else {
      cafe.facing = findFacingDirection(cafe);
      cafe.facingSource = cafe.facing !== null ? 'geo' : null;
    }
  }

  // Parse opening hours if library loaded
  if (ohLibLoaded && typeof opening_hours !== 'undefined') {
    for (const cafe of cafes) {
      if (cafe.hours) {
        try {
          cafe.oh = new opening_hours(cafe.hours, { address: { country_code: 'de' } });
        } catch { cafe.oh = null; }
      }
    }
  }

  updateSunnyScores();
  document.getElementById('cafeCount').textContent = cafes.length;
  const src = getCache(getCacheKey(getBbox())) ? ' Cafes (Cache)' : ' Cafes geladen';
  document.getElementById('stats').querySelector('strong').nextSibling.textContent = src;
}

// ── Geometry Utils ─────────────────────────────
function nearestPointOnSegment(px, py, ax, ay, bx, by) {
  const dx = bx - ax, dy = by - ay;
  const lenSq = dx * dx + dy * dy;
  if (lenSq === 0) return { lat: ax, lng: ay, dist: Math.hypot(px - ax, py - ay) };
  const t = Math.max(0, Math.min(1, ((px - ax) * dx + (py - ay) * dy) / lenSq));
  const nx = ax + t * dx, ny = ay + t * dy;
  return { lat: nx, lng: ny, dist: Math.hypot(px - nx, py - ny) };
}

function compassBearing(lat1, lng1, lat2, lng2) {
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const la1 = lat1 * Math.PI / 180, la2 = lat2 * Math.PI / 180;
  const y = Math.sin(dLng) * Math.cos(la2);
  const x = Math.cos(la1) * Math.sin(la2) - Math.sin(la1) * Math.cos(la2) * Math.cos(dLng);
  return ((Math.atan2(y, x) * 180 / Math.PI) + 360) % 360;
}

function findFacingDirection(cafe) {
  let minDist = Infinity;
  let nearestLat = null, nearestLng = null;

  for (const street of streets) {
    for (let i = 0; i < street.length - 1; i++) {
      const p = nearestPointOnSegment(
        cafe.lat, cafe.lng,
        street[i][0], street[i][1],
        street[i + 1][0], street[i + 1][1]
      );
      if (p.dist < minDist) {
        minDist = p.dist;
        nearestLat = p.lat;
        nearestLng = p.lng;
      }
    }
  }

  if (nearestLat === null) return null;
  return compassBearing(cafe.lat, cafe.lng, nearestLat, nearestLng);
}

// ── Sunny Score ────────────────────────────────
function sunBearing(time, lat, lng) {
  const pos = SunCalc.getPosition(time, lat, lng);
  // SunCalc: azimuth 0=South, PI/2=West → convert to compass (0=North)
  const bearing = ((pos.azimuth * 180 / Math.PI) + 180) % 360;
  return { bearing, altitude: pos.altitude * 180 / Math.PI };
}

function angleDiff(a, b) {
  const d = Math.abs(a - b);
  return Math.min(d, 360 - d);
}

function calculateScore(cafe, sun) {
  if (sun.altitude < 5) return { status: 'night', label: 'Nacht', color: '#444' };
  if (cafe.facing === null) return { status: 'unknown', label: 'Unbekannt', color: '#555' };

  const diff = angleDiff(sun.bearing, cafe.facing);
  let status, label, color;
  if (diff < 45) { status = 'sunny'; label = 'Sonnig'; color = '#4CAF50'; }
  else if (diff < 90) { status = 'partial'; label = 'Teilweise'; color = '#FF9800'; }
  else { status = 'shade'; label = 'Schatten'; color = '#78909C'; }

  // Cloud cover adjustment
  const cloud = getCloudCover(selectedTime);
  if (cloud !== null) {
    if (cloud > 85) {
      status = 'shade'; label = 'Schatten'; color = '#78909C';
    } else if (cloud > 60 && status === 'sunny') {
      status = 'partial'; label = 'Teilweise'; color = '#FF9800';
    }
  }

  return { status, label, color };
}

function estimateSunWindow(cafe, date) {
  if (cafe.facing === null || !sunTimes) return null;
  const sunrise = sunTimes.sunrise;
  const sunset = sunTimes.sunset;
  let start = null, end = null;
  const step = 15 * 60 * 1000; // 15 min

  for (let t = sunrise.getTime(); t <= sunset.getTime(); t += step) {
    const sun = sunBearing(new Date(t), cafe.lat, cafe.lng);
    const diff = angleDiff(sun.bearing, cafe.facing);
    if (diff < 90 && sun.altitude >= 5) {
      if (start === null) start = new Date(t);
      end = new Date(t);
    }
  }

  if (!start) return null;
  return { start, end: new Date(end.getTime() + step) };
}

function formatTime(d) {
  return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
}

function bearingToDirection(b) {
  const dirs = ['N', 'NO', 'O', 'SO', 'S', 'SW', 'W', 'NW'];
  return dirs[Math.round(b / 45) % 8];
}

// ── Rendering ──────────────────────────────────
function updateSunnyScores() {
  const center = map.getCenter();
  const sun = sunBearing(selectedTime, center.lat, center.lng);

  // Update sun compass
  const arrow = document.getElementById('sunArrow');
  arrow.style.transform = `rotate(${sun.bearing}deg)`;

  cafeLayer.clearLayers();
  const hideClosed = document.getElementById('filterClosed')?.checked;

  for (const cafe of cafes) {
    const score = calculateScore(cafe, sun);
    cafe.score = score;

    // Opening hours
    cafe.isOpen = cafe.oh ? cafe.oh.getState(selectedTime) : null;
    if (hideClosed && cafe.isOpen === false) continue;

    const markerOpacity = cafe.isOpen === false ? 0.35 : 0.85;

    const marker = L.circleMarker([cafe.lat, cafe.lng], {
      radius: 8,
      fillColor: score.color,
      fillOpacity: markerOpacity,
      color: 'rgba(255,255,255,0.15)',
      weight: 1
    });

    // Build popup
    const sunWin = estimateSunWindow(cafe, selectedTime);
    let windowHtml = '';
    if (sunWin) {
      windowHtml = `<div class="popup-sun-hours">&#9728; Sonne ca. ${formatTime(sunWin.start)} – ${formatTime(sunWin.end)}</div>`;
    }

    const facingDir = cafe.facing !== null ? bearingToDirection(cafe.facing) : null;
    const sourceTag = cafe.facingSource === 'ai' ? ' (AI)' : cafe.facingSource === 'geo' ? ' (Geo)' : '';
    const facingStr = facingDir
      ? `Ausrichtung: ${facingDir}${sourceTag}`
      : 'Ausrichtung: unbekannt';

    const aiDesc = cafe.aiDescription
      ? `<div class="popup-ai-desc">${cafe.aiDescription}</div>`
      : '';

    const confidenceDot = cafe.aiConfidence === 'high' ? '🟢'
      : cafe.aiConfidence === 'medium' ? '🟡' : cafe.aiConfidence === 'low' ? '🔴' : '';

    // Opening hours display
    let openHtml = '';
    if (cafe.isOpen === true) {
      const nextChange = cafe.oh.getNextChange(selectedTime);
      const closingStr = nextChange ? ` bis ${formatTime(nextChange)}` : '';
      openHtml = `<div class="popup-detail" style="color:#4CAF50">Geöffnet${closingStr}</div>`;
    } else if (cafe.isOpen === false) {
      openHtml = `<div class="popup-detail" style="color:#78909C">Geschlossen</div>`;
    } else if (cafe.hours) {
      openHtml = `<div class="popup-detail">${cafe.hours}</div>`;
    }

    marker.bindPopup(`
      <div class="popup-name">${cafe.name}</div>
      <span class="popup-status ${score.status}">${score.label}</span>
      ${confidenceDot ? `<span style="font-size:10px;margin-left:4px">${confidenceDot}</span>` : ''}
      ${aiDesc}
      <div class="popup-detail">${facingStr}</div>
      ${openHtml}
      ${windowHtml}
    `, { maxWidth: 280 });

    if (isMobile()) {
      marker.on('click', () => { openSheet(cafe); });
      marker.unbindPopup();
    }

    marker.addTo(cafeLayer);
    cafe.marker = marker;
  }

  renderList();
}

// ── Time Slider ────────────────────────────────
function getBaseDate() {
  if (selectedDate) {
    const [y, m, d] = selectedDate.split('-').map(Number);
    return new Date(y, m - 1, d);
  }
  return new Date();
}

function updateSliderRange() {
  const slider = document.getElementById('timeSlider');
  const sunriseMin = sunTimes.sunrise.getHours() * 60 + sunTimes.sunrise.getMinutes();
  const sunsetMin = sunTimes.sunset.getHours() * 60 + sunTimes.sunset.getMinutes();
  slider.min = Math.max(0, sunriseMin - 30);
  slider.max = Math.min(1440, sunsetMin + 30);
  document.getElementById('sunriseLabel').textContent = `Aufgang ${formatTime(sunTimes.sunrise)}`;
  document.getElementById('sunsetLabel').textContent = `Untergang ${formatTime(sunTimes.sunset)}`;
}

function updateDateDisplay() {
  const date = getBaseDate();
  const dateStr = date.toLocaleDateString('de-DE', { weekday: 'short', day: 'numeric', month: 'short' });
  document.getElementById('dateValue').textContent = dateStr;
}

function initTimeSlider(skipSetNow) {
  const center = map.getCenter();
  const baseDate = getBaseDate();
  sunTimes = SunCalc.getTimes(baseDate, center.lat, center.lng);

  updateSliderRange();
  if (!skipSetNow) setNow();
  updateDateDisplay();

  const slider = document.getElementById('timeSlider');
  slider.addEventListener('input', () => {
    const mins = parseInt(slider.value);
    const h = Math.floor(mins / 60), m = mins % 60;
    const base = getBaseDate();
    selectedTime = new Date(base);
    selectedTime.setHours(h, m, 0, 0);
    document.getElementById('timeValue').textContent = formatTime(selectedTime);
    updateCloudBadge();
    updateSunnyScores();
  });
  slider.addEventListener('change', () => updateUrl());

  updateDateDisplay();

  document.getElementById('datePicker').addEventListener('change', (e) => {
    if (!e.target.value) return;
    selectedDate = e.target.value;
    const date = getBaseDate();
    const center = map.getCenter();
    sunTimes = SunCalc.getTimes(date, center.lat, center.lng);
    updateSliderRange();
    updateDateDisplay();
    const mins = parseInt(document.getElementById('timeSlider').value);
    selectedTime = new Date(date);
    selectedTime.setHours(Math.floor(mins / 60), mins % 60, 0, 0);
    updateCloudBadge();
    updateSunnyScores();
    updateUrl();
  });
}

function setNow() {
  selectedDate = null;
  selectedTime = new Date();
  const center = map.getCenter();
  sunTimes = SunCalc.getTimes(new Date(), center.lat, center.lng);
  updateSliderRange();
  updateDateDisplay();
  const mins = selectedTime.getHours() * 60 + selectedTime.getMinutes();
  document.getElementById('timeSlider').value = mins;
  document.getElementById('timeValue').textContent = formatTime(selectedTime);
  document.getElementById('datePicker').value = '';
  updateCloudBadge();
  updateSunnyScores();
  updateUrl();
}

// ── Search ─────────────────────────────────────
async function searchLocation() {
  const query = document.getElementById('searchInput').value.trim();
  if (!query) return;

  try {
    const res = await fetch(
      `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`,
      { headers: { 'Accept-Language': 'de' } }
    );
    const data = await res.json();
    if (data.length > 0) {
      const { lat, lon } = data[0];
      map.setView([parseFloat(lat), parseFloat(lon)], 15);
      initTimeSlider();
      updateUrl();
    }
  } catch (err) {
    console.error('Search error:', err);
  }
}

document.getElementById('searchInput').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') searchLocation();
});

// ── Loading & Toast ────────────────────────────
function showLoading(active) {
  document.getElementById('loading').classList.toggle('active', active);
}

let toastTimer = null;
function showToast(msg, type = 'warn', duration = 6000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type} active`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('active'), duration);
}

// ── Cafe List View ───────────────────────────
let listVisible = false;
let listSortMode = 'sunny'; // 'sunny' or 'distance'

function toggleListView() {
  listVisible = !listVisible;
  const panel = document.getElementById('cafeListPanel');
  const btn = document.getElementById('listToggle');
  const mapEl = document.getElementById('map');

  panel.classList.toggle('open', listVisible);
  btn.style.display = listVisible ? 'none' : 'flex';

  if (window.innerWidth >= 768) {
    mapEl.classList.toggle('split', listVisible);
    setTimeout(() => map.invalidateSize(), 50);
  }

  if (listVisible) renderList();
}

function setListSort(mode) {
  listSortMode = mode;
  document.getElementById('sortSunny').classList.toggle('active', mode === 'sunny');
  document.getElementById('sortDistance').classList.toggle('active', mode === 'distance');
  renderList();
}

function renderList() {
  if (!listVisible) return;
  const container = document.getElementById('listItems');
  const center = map.getCenter();
  const hideClosed = document.getElementById('filterClosed')?.checked;

  const scoreOrder = { sunny: 0, partial: 1, unknown: 2, shade: 3, night: 4 };

  let filtered = cafes.filter(c => {
    if (hideClosed && c.isOpen === false) return false;
    return c.score;
  });

  // Calculate distances
  for (const c of filtered) {
    c._dist = map.distance([c.lat, c.lng], [center.lat, center.lng]);
  }

  // Sort
  if (listSortMode === 'sunny') {
    filtered.sort((a, b) => {
      const sa = scoreOrder[a.score.status] ?? 9;
      const sb = scoreOrder[b.score.status] ?? 9;
      return sa !== sb ? sa - sb : a._dist - b._dist;
    });
  } else {
    filtered.sort((a, b) => {
      if (a._dist !== b._dist) return a._dist - b._dist;
      return (scoreOrder[a.score.status] ?? 9) - (scoreOrder[b.score.status] ?? 9);
    });
  }

  document.getElementById('listCount').textContent = `${filtered.length} Cafés`;

  // Build list items using DOM
  container.textContent = '';

  for (const cafe of filtered) {
    const item = document.createElement('div');
    item.className = 'list-item' + (cafe.isOpen === false ? ' list-closed' : '');

    const dot = document.createElement('div');
    dot.className = 'list-dot';
    dot.style.background = cafe.score.color;

    const info = document.createElement('div');
    info.className = 'list-info';

    const name = document.createElement('div');
    name.className = 'list-name';
    name.textContent = cafe.name;

    const meta = document.createElement('div');
    meta.className = 'list-meta';

    const sunWin = estimateSunWindow(cafe, selectedTime);
    if (sunWin) {
      const sunSpan = document.createElement('span');
      sunSpan.textContent = `☀️ ${formatTime(sunWin.start)}–${formatTime(sunWin.end)}`;
      meta.appendChild(sunSpan);
    }

    const distSpan = document.createElement('span');
    distSpan.textContent = cafe._dist < 1000 ? `${Math.round(cafe._dist)}m` : `${(cafe._dist / 1000).toFixed(1)}km`;
    meta.appendChild(distSpan);

    if (cafe.isOpen === true) {
      const openSpan = document.createElement('span');
      openSpan.textContent = 'Geöffnet';
      openSpan.style.color = '#4CAF50';
      meta.appendChild(openSpan);
    } else if (cafe.isOpen === false) {
      const closedSpan = document.createElement('span');
      closedSpan.textContent = 'Geschlossen';
      closedSpan.style.color = '#78909C';
      meta.appendChild(closedSpan);
    }

    info.appendChild(name);
    info.appendChild(meta);
    item.appendChild(dot);
    item.appendChild(info);

    item.addEventListener('click', () => {
      if (isMobile()) toggleListView();
      map.setView([cafe.lat, cafe.lng], Math.max(map.getZoom(), 16));
      if (cafe.marker) {
        if (isMobile()) {
          openSheet(cafe);
        } else {
          cafe.marker.openPopup();
        }
      }
    });

    container.appendChild(item);
  }
}

// ── Bottom Sheet (Mobile) ─────────────────────
const isMobile = () => window.innerWidth < 768;
let sheetStartY = 0, sheetCurrentY = 0, sheetDragging = false;

function openSheet(cafe) {
  const sheet = document.getElementById('bottomSheet');
  const content = document.getElementById('sheetContent');

  const score = cafe.score || { status: 'unknown', label: '?', color: '#555' };
  const sunWin = estimateSunWindow(cafe, selectedTime);
  const facingDir = cafe.facing !== null ? bearingToDirection(cafe.facing) : null;
  const sourceTag = cafe.facingSource === 'ai' ? ' (AI)' : cafe.facingSource === 'geo' ? ' (Geo)' : '';

  let openStr = '';
  if (cafe.isOpen === true) {
    const next = cafe.oh?.getNextChange(selectedTime);
    openStr = 'Geöffnet' + (next ? ` bis ${formatTime(next)}` : '');
  } else if (cafe.isOpen === false) {
    openStr = 'Geschlossen';
  } else if (cafe.hours) {
    openStr = cafe.hours;
  }

  const center = map.getCenter();
  const dist = map.distance([cafe.lat, cafe.lng], [center.lat, center.lng]);
  const distStr = dist < 1000 ? `${Math.round(dist)}m` : `${(dist / 1000).toFixed(1)}km`;

  // Build sheet content safely using DOM
  content.textContent = '';

  const nameEl = document.createElement('div');
  nameEl.className = 'sheet-name';
  nameEl.textContent = cafe.name;
  content.appendChild(nameEl);

  const scoreEl = document.createElement('span');
  scoreEl.className = 'sheet-score';
  scoreEl.style.background = score.color + '22';
  scoreEl.style.color = score.color;
  scoreEl.textContent = score.label;
  content.appendChild(scoreEl);

  if (cafe.aiDescription) {
    const aiEl = document.createElement('div');
    aiEl.className = 'sheet-ai-desc';
    aiEl.textContent = cafe.aiDescription;
    content.appendChild(aiEl);
  }

  if (sunWin) {
    const row = document.createElement('div');
    row.className = 'sheet-row';
    row.innerHTML = `<span>&#9728;&#65039; Sonne</span><span>${formatTime(sunWin.start)} – ${formatTime(sunWin.end)}</span>`;
    content.appendChild(row);
  }

  if (openStr) {
    const row = document.createElement('div');
    row.className = 'sheet-row';
    const labelSpan = document.createElement('span');
    labelSpan.textContent = 'Öffnungszeiten';
    const valSpan = document.createElement('span');
    valSpan.textContent = openStr;
    if (cafe.isOpen === true) valSpan.style.color = '#4CAF50';
    if (cafe.isOpen === false) valSpan.style.color = '#78909C';
    row.appendChild(labelSpan);
    row.appendChild(valSpan);
    content.appendChild(row);
  }

  const facingRow = document.createElement('div');
  facingRow.className = 'sheet-row';
  facingRow.innerHTML = `<span>Ausrichtung</span><span>${facingDir ? facingDir + sourceTag : 'Unbekannt'}</span>`;
  content.appendChild(facingRow);

  const distRow = document.createElement('div');
  distRow.className = 'sheet-row';
  distRow.innerHTML = `<span>Entfernung</span><span>${distStr}</span>`;
  content.appendChild(distRow);

  sheet.style.display = 'block';
  requestAnimationFrame(() => sheet.classList.add('open'));
}

function closeSheet() {
  const sheet = document.getElementById('bottomSheet');
  sheet.classList.remove('open');
  setTimeout(() => { sheet.style.display = 'none'; }, 300);
}

// Touch-to-dismiss
document.getElementById('bottomSheet').addEventListener('touchstart', (e) => {
  sheetStartY = e.touches[0].clientY;
  sheetDragging = true;
  document.getElementById('bottomSheet').style.transition = 'none';
}, { passive: true });

document.getElementById('bottomSheet').addEventListener('touchmove', (e) => {
  if (!sheetDragging) return;
  sheetCurrentY = e.touches[0].clientY - sheetStartY;
  if (sheetCurrentY > 0) {
    document.getElementById('bottomSheet').style.transform = `translateY(${sheetCurrentY}px)`;
  }
}, { passive: true });

document.getElementById('bottomSheet').addEventListener('touchend', () => {
  if (!sheetDragging) return;
  sheetDragging = false;
  const sheet = document.getElementById('bottomSheet');
  sheet.style.transition = 'transform 0.3s ease';
  if (sheetCurrentY > 80) {
    closeSheet();
  } else {
    sheet.style.transform = 'translateY(0)';
  }
  sheetCurrentY = 0;
});

// ── URL State ─────────────────────────────────
function readUrlState() {
  const p = new URLSearchParams(location.search);
  return {
    lat: p.has('lat') ? parseFloat(p.get('lat')) : null,
    lng: p.has('lng') ? parseFloat(p.get('lng')) : null,
    z: p.has('z') ? parseInt(p.get('z')) : null,
    t: p.get('t'),
    d: p.get('d'),
    q: p.get('q'),
  };
}

function updateUrl() {
  if (!map || !urlReady) return;
  const c = map.getCenter();
  const params = new URLSearchParams();
  params.set('lat', c.lat.toFixed(4));
  params.set('lng', c.lng.toFixed(4));
  params.set('z', map.getZoom());
  params.set('t', formatTime(selectedTime));
  if (selectedDate) params.set('d', selectedDate);
  const q = document.getElementById('searchInput').value.trim();
  if (q) params.set('q', q);
  history.replaceState(null, '', '?' + params.toString());
}

// ── Startup ────────────────────────────────────
(function init() {
  const state = readUrlState();
  if (state.q) document.getElementById('searchInput').value = state.q;

  if (state.d) {
    selectedDate = state.d;
    document.getElementById('datePicker').value = state.d;
  }

  if (state.lat !== null && state.lng !== null) {
    initMap(state.lat, state.lng, state.z || 14, !!state.t);
    if (state.t) {
      const [h, m] = state.t.split(':').map(Number);
      selectedTime.setHours(h, m, 0, 0);
      const mins = h * 60 + m;
      document.getElementById('timeSlider').value = mins;
      document.getElementById('timeValue').textContent = formatTime(selectedTime);
      updateCloudBadge();
      updateSunnyScores();
    }
    // Defer urlReady to next microtask so any pending moveend events are suppressed
    Promise.resolve().then(() => { urlReady = true; updateUrl(); });
  } else if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      (pos) => { initMap(pos.coords.latitude, pos.coords.longitude); urlReady = true; },
      () => { initMap(53.5511, 9.9937); urlReady = true; },
      { timeout: 5000 }
    );
  } else {
    initMap(53.5511, 9.9937);
    urlReady = true;
  }
})();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>
